<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Ajay D'Souza — WordPress developer, blogger, and founder of WebberZone" />
  <title>Ajay D'Souza</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf8f5;
      color: #332e28;
    }

    .bio-container {
      max-width: 680px;
      margin: 5rem auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      min-height: calc(100vh - 10rem);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .profile-header-text { flex: 1; }

    #gravatar-image {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #fff;
      border: 2px solid #e8e2d8;
    }

    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2.25rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 0.25rem;
      color: #1a1815;
    }

    .tagline {
      font-size: 0.9rem;
      color: #6b6259;
    }

    .social-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
    }

    .link-card {
      display: block;
      padding: 1.25rem 1.5rem;
      border: 1px solid #e8e2d8;
      border-radius: 10px;
      text-decoration: none;
      background: #fff;
    }

    @media (max-width: 768px) {
      .bio-container { margin: 2rem auto; padding: 0 1rem; gap: 2rem; min-height: calc(100vh - 4rem); }
      .profile-header { flex-direction: column; align-items: center; text-align: center; gap: 0.75rem; }
      #gravatar-image { width: 80px; height: 80px; }
      h1 { font-size: 1.75rem; }
      .social-icons { justify-content: center; }
    }

    @media (max-width: 420px) {
      .bio-container { margin: 1.25rem auto; padding: 0 0.75rem; gap: 1.5rem; min-height: calc(100vh - 2.5rem); }
      h1 { font-size: 1.5rem; }
      .tagline { font-size: 0.8rem; }
      .link-card { padding: 1rem 1.25rem; border-radius: 8px; }
    }
  </style>

  <link rel="preload" href="styles/core.css" as="style">
  <link rel="stylesheet" href="styles/core.css" />
  <link rel="stylesheet" href="styles/neon.css" />
  <script src="crypto-js.min.js" defer></script>
  <script src="main.js" defer></script>
</head>
<body>
  <main class="bio-container" role="main">
    <header class="profile-header" role="banner">
      <img id="gravatar-image" alt="Profile picture of Ajay D'Souza" width="80" height="80" />
      <div class="profile-header-text">
        <h1 id="profile-name"></h1>
        <p id="profile-tagline" class="tagline"></p>
        <nav class="social-icons" aria-label="Social media links"></nav>
      </div>
    </header>

    <section class="blog-section" aria-label="Latest blog post">
      <h2>Latest from my blog</h2>
      <div class="blog-post">
        <div class="post-content">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-body"></div>
          <div class="skeleton skeleton-body"></div>
          <div class="skeleton skeleton-body"></div>
          <p class="loading-text" style="margin-top:0.75rem">Fetching latest post&hellip;</p>
        </div>
      </div>
    </section>

    <section id="link-section" class="link-section" aria-label="Quick links">
      <h2>Links</h2>
      <div class="links-grid"></div>
    </section>

    <section class="additional-feeds-section" aria-label="Additional feeds">
      <h2>Other feeds</h2>
      <div id="additional-feeds-container">
        <p class="loading-text">Fetching feed updates&hellip;</p>
      </div>
    </section>

    <section class="bio" aria-label="Biography">
      <h2>About</h2>
      <p id="bio-text"></p>
    </section>

    <footer class="footer" role="contentinfo">
      <div class="footer-buttons">
        <a id="contact-button" href="#" class="support-button" aria-label="Contact Me"></a>
        <a id="support-button" href="#" class="support-button" aria-label="Support button"></a>
      </div>
    </footer>
  </main>
</body>
</html>
